<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uniq — Live Dashboard</title>
<style>
  :root {
    --yellow: #fedb15;
    --black: #111113;
    --surface: #1c1c1f;
    --surface2: #252528;
    --surface3: #2e2e32;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0ee;
    --muted: rgba(255,255,255,0.45);
    --faint: rgba(255,255,255,0.22);
    --green: #1db87c;
    --red: #e24b4a;
    --amber: #ef9f27;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--black); color: var(--text); font-size: 13px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* PASSWORD */
  #lock { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .lock-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 36px 32px; width: 340px; text-align: center; }
  .lock-box img { height: 48px; margin-bottom: 18px; }
  .lock-box h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .lock-box p { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .lock-box input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; }
  .lock-box button { width: 100%; padding: 11px; background: var(--yellow); color: #111; font-size: 14px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; }
  .lock-err { font-size: 12px; color: var(--red); margin-top: 8px; }

  /* LAYOUT */
  #app { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: var(--sidebar-w); flex-shrink: 0; background: #0e0e10; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* SIDEBAR */
  .logo-area { padding: 18px 14px 14px; border-bottom: 1px solid var(--border); }
  .logo-area .brand { font-size: 13px; font-weight: 700; color: var(--yellow); letter-spacing: 0.04em; }
  .logo-area .sub { font-size: 11px; color: var(--faint); margin-top: 2px; }
  .nav-section { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); padding: 14px 14px 5px; }
  .nav-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 8px 14px; background: none; border: none; color: rgba(255,255,255,0.6); font-size: 12.5px; text-align: left; cursor: pointer; border-radius: 0; transition: background 0.1s; gap: 6px; }
  .nav-btn:hover { background: rgba(255,255,255,0.04); }
  .nav-btn.active { color: var(--yellow); background: rgba(254,219,21,0.1); }
  .nav-btn .label { flex: 1; }
  .badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; background: rgba(255,255,255,0.1); color: var(--muted); min-width: 20px; text-align: center; }
  .badge.urgent { background: rgba(226,75,74,0.25); color: #f87171; }
  .badge.warn { background: rgba(239,159,39,0.2); color: #f4b860; }
  .sidebar-footer { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
  .refresh-btn { width: 100%; padding: 9px; background: var(--yellow); color: #111; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .last-updated { text-align: center; font-size: 10px; color: var(--faint); margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* TOPBAR */
  #topbar { padding: 12px 20px; border-bottom: 1px solid var(--border); background: #0e0e10; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #topbar .title { font-size: 14px; font-weight: 600; }
  #topbar .meta { font-size: 11px; color: var(--muted); }

  /* CONTENT */
  #content { flex: 1; overflow-y: auto; padding: 18px 20px; }

  /* CARDS */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 15px; }
  .stat-card.accent-green { border-top: 3px solid var(--green); }
  .stat-card.accent-yellow { border-top: 3px solid var(--yellow); }
  .stat-card.accent-red { border-top: 3px solid var(--red); }
  .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 6px; }
  .stat-val { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-val.green { color: var(--green); }
  .stat-val.yellow { color: var(--yellow); }
  .stat-val.red { color: var(--red); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ORDER CARDS */
  .order-card { background: var(--surface); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .order-accent { height: 4px; }
  .order-accent.urgent { background: var(--red); }
  .order-accent.warning { background: var(--amber); }
  .order-accent.ok { background: var(--green); }
  .order-body { padding: 13px 15px; }
  .order-row1 { display: flex; gap: 14px; margin-bottom: 10px; }
  .plate-img { width: 220px; height: 90px; object-fit: contain; flex-shrink: 0; border-radius: 6px; background: var(--surface2); }
  .plate-img-empty { width: 220px; flex-shrink: 0; }
  .order-info { flex: 1; min-width: 0; }
  .order-meta { font-size: 11px; color: var(--faint); margin-bottom: 3px; }
  .order-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .reg-plate { display: inline-block; background: var(--yellow); color: #111; font-family: monospace; font-size: 14px; font-weight: 800; padding: 4px 11px; border-radius: 4px; letter-spacing: 2px; border: 2px solid #c9ac00; }
  .order-right { text-align: right; flex-shrink: 0; }
  .order-val { font-size: 17px; font-weight: 700; }
  .days-chip { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .days-chip.urgent { background: rgba(226,75,74,0.18); color: #f08a89; }
  .days-chip.warning { background: rgba(239,159,39,0.18); color: #f4b860; }
  .days-chip.ok { background: rgba(29,184,124,0.18); color: #5fd4a8; }
  .spec-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin: 8px 0; }
  .spec-box { background: var(--surface2); border-radius: 6px; padding: 5px 8px; }
  .spec-lbl { font-size: 9px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.05em; }
  .spec-val { font-size: 11px; font-weight: 600; }
  .holder-chip { font-size: 11px; padding: 2px 9px; border-radius: 20px; background: rgba(254,219,21,0.1); color: var(--yellow); display: inline-block; margin-bottom: 6px; }
  .note-box { font-size: 11px; color: #f4b860; background: rgba(239,159,39,0.1); border-radius: 6px; padding: 4px 9px; margin-bottom: 8px; font-style: italic; }
  .order-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 9px; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 7px; }
  .doc-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
  .doc-chip.conf { background: rgba(29,184,124,0.18); color: #5fd4a8; }
  .doc-chip.pend { background: rgba(239,159,39,0.18); color: #f4b860; }
  .doc-chip.none { background: rgba(226,75,74,0.18); color: #f08a89; }
  .doc-chip.na { background: rgba(255,255,255,0.07); color: var(--muted); }
  .fulfill-btn { font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 6px; cursor: pointer; border: none; background: var(--yellow); color: #111; }
  .fulfill-btn:hover { background: #e6c800; }

  /* SECTION TITLE */
  .section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  /* INBOX */
  #inbox-wrap { display: flex; height: 100%; overflow: hidden; margin: -18px -20px; }
  .inbox-list { width: 270px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: #0e0e10; overflow: hidden; }
  .inbox-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .inbox-header .h-title { font-size: 13px; font-weight: 600; }
  .inbox-refresh { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; }
  .inbox-threads { flex: 1; overflow-y: auto; }
  .thread-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; border-left: 3px solid transparent; transition: background 0.1s; }
  .thread-item:hover { background: rgba(255,255,255,0.03); }
  .thread-item.active { background: rgba(254,219,21,0.07); border-left-color: var(--yellow); }
  .thread-item.unread .thread-sender { font-weight: 700; }
  .thread-sender { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .thread-subject { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .thread-snippet { font-size: 10px; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .thread-date { font-size: 10px; color: var(--faint); }
  .inbox-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .msg-header { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .msg-header .subject { font-size: 14px; font-weight: 600; }
  .msg-header .from { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .msg-thread { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 12px; }
  .bubble-wrap { display: flex; flex-direction: column; }
  .bubble-wrap.us { align-items: flex-end; }
  .bubble-wrap.them { align-items: flex-start; }
  .bubble-from { font-size: 10px; color: var(--faint); margin-bottom: 3px; }
  .bubble { padding: 10px 14px; border-radius: 10px; font-size: 12px; line-height: 1.6; white-space: pre-wrap; max-width: 80%; }
  .bubble.us { background: var(--yellow); color: #111; }
  .bubble.them { background: var(--surface2); border: 1px solid var(--border); }
  .compose-area { background: #0e0e10; border-top: 1px solid var(--border); padding: 12px 18px; flex-shrink: 0; }
  .compose-label { font-size: 10px; color: var(--faint); margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
  .compose-label button { font-size: 10px; background: none; border: none; color: var(--muted); cursor: pointer; }
  .compose-textarea { width: 100%; min-height: 90px; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; font-family: inherit; resize: vertical; outline: none; line-height: 1.55; }
  .compose-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  .btn-clear { font-size: 11px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; }
  .btn-send { font-size: 12px; font-weight: 600; padding: 6px 18px; border-radius: 6px; border: none; background: var(--yellow); color: #111; cursor: pointer; }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: var(--faint); font-size: 13px; }

  /* SETTINGS */
  .settings-wrap { max-width: 460px; display: flex; flex-direction: column; gap: 12px; }
  .settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .settings-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .settings-card p { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
  .settings-input { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 10px; }
  .settings-save { padding: 9px 20px; background: var(--yellow); color: #111; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; }

  /* FINANCE BAR CHART */
  .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-bottom: 6px; }
  .bar-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bar-fill { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
  .bar-lbl { font-size: 8px; color: var(--faint); }

  /* TABLE */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { text-align: left; padding: 7px 9px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); }
  .data-table td { padding: 8px 9px; border-bottom: 1px solid var(--border); vertical-align: middle; }

  /* STOCK */
  .stock-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 5px; text-align: center; }
  .stock-cell.warn { background: rgba(239,159,39,0.12); border-color: var(--amber); }
  .stock-cell.crit { background: rgba(226,75,74,0.12); border-color: var(--red); }
  .stock-digit { font-size: 16px; font-weight: 800; font-family: monospace; line-height: 1; }
  .stock-qty { font-size: 15px; font-weight: 700; }
  .stock-qty.warn { color: #f4b860; }
  .stock-qty.crit { color: #f08a89; }
  .stock-btns { display: flex; justify-content: center; gap: 3px; margin-top: 4px; }
  .stock-btn { width: 20px; height: 20px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }

  /* LOADING OVERLAY */
  .loading-overlay { position: absolute; inset: 0; background: rgba(17,17,19,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; border-radius: 10px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* UNREAD BADGE */
  .unread-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--red); margin-left: 5px; vertical-align: middle; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* FILTER PILLS */
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; }
  .pill.active { background: var(--yellow); color: #111; border-color: var(--yellow); }
</style>
</head>
<body>

<!-- PASSWORD LOCK -->
<div id="lock">
  <div class="lock-box">
    <div style="font-size:28px;margin-bottom:12px;">🚘</div>
    <h2>Uniq Automotive</h2>
    <p>Production Dashboard — Enter password to continue</p>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Continue</button>
    <div class="lock-err" id="pw-err"></div>
  </div>
</div>

<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="logo-area">
      <div class="brand">UNIQ AUTOMOTIVE</div>
      <div class="sub">Live Production Dashboard</div>
    </div>
    <nav id="nav" style="flex:1;overflow-y:auto;padding:6px 0;"></nav>
    <div class="sidebar-footer">
      <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
        <span>↻</span><span id="refresh-label">Refresh all data</span>
      </button>
      <div class="last-updated" id="last-updated">Not yet refreshed</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="title" id="page-title">Dashboard</div>
      <div class="meta" id="page-meta">uniqautos.co.uk</div>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const PW = 'Enzofatboi';
const YELLOW = '#fedb15', GREEN = '#1db87c', RED = '#e24b4a', AMBER = '#ef9f27';
const SHOPIFY_FEE = 0.02;
const CHEN_MIA_DATE = new Date('2026-07-01');
const DIGITS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const STYLES = ['retro','5mm','gel'];
const STYLE_LABELS = {retro:'Retro','5mm':'5MM Retro',gel:'3D Gel'};
const LOW_WARN = 8, LOW_CRIT = 4;
const GDRIVE_DOCS_FOLDER = '1Jp8y5ncO2N2mmpp9hkUC2XiCM-ULguZ-7FSLA_5hnxYDsmys-aHDy5ChviVqtJtyZ4nJ-GPT';

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  view: 'all',
  orders: load('uniq_orders', []),
  finData: load('uniq_fin', []),
  stock: load('uniq_stock', initStock()),
  apiKey: localStorage.getItem('uniq_api') || '',
  inbox: load('uniq_inbox', []),
  selectedThread: null,
  drafts: {},
  sending: {},
  composing: {},
  sent: {},
  refreshing: false,
  lastUpdated: null,
  inboxLoading: false,
};

function load(k, def) {
  try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : def; } catch { return def; }
}
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

function initStock() {
  const s = {};
  STYLES.forEach(st => { s[st] = {}; DIGITS.forEach(d => { s[st][d] = 20; }); });
  return s;
}

// ─── PASSWORD ────────────────────────────────────────────────────────────────
function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === PW) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    init();
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect password';
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  renderNav();
  renderView();
  // Auto-refresh on load if API key set
  if (state.apiKey) {
    setTimeout(() => refreshAll(), 800);
    setInterval(() => refreshAll(), 5 * 60 * 1000);
  }
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
const NAV = [
  { section: 'Orders' },
  { id:'all', label:'All orders', icon:'📋' },
  { id:'urgent', label:'Urgent 10+ days', icon:'🔴' },
  { id:'warning', label:'7–9 days', icon:'🟡' },
  { id:'recent', label:'Recent', icon:'🟢' },
  { id:'docs', label:'Docs pending', icon:'📂' },
  { id:'luxury', label:'Luxury builder', icon:'🪪' },
  { id:'standard', label:'Standard plates', icon:'⚡' },
  { id:'accessories', label:'Accessories', icon:'📦' },
  { section: 'Finance & Stock' },
  { id:'finance', label:'Financials', icon:'💰' },
  { id:'stock', label:'Stock tracker', icon:'🗂' },
  { section: 'Comms' },
  { id:'inbox', label:'Customer inbox', icon:'✉' },
  { section: 'Settings' },
  { id:'settings', label:'API key & settings', icon:'⚙' },
];

function getBadge(id) {
  const o = state.orders;
  const docsPend = o.filter(x => x.isPlate && !isStd(x) && x.docs !== 'conf' && x.docs !== 'na').length;
  const urgent = o.filter(x => x.days >= 10).length;
  const warn = o.filter(x => x.days >= 7 && x.days < 10).length;
  const map = {
    all: { n: o.length },
    urgent: { n: urgent, type: urgent > 0 ? 'urgent' : '' },
    warning: { n: warn, type: warn > 0 ? 'warn' : '' },
    recent: { n: o.filter(x => x.days < 7).length },
    docs: { n: docsPend, type: docsPend > 0 ? 'urgent' : '' },
    luxury: { n: o.filter(x => x.isPlate && !isStd(x)).length },
    standard: { n: o.filter(x => isStd(x)).length },
    accessories: { n: o.filter(x => !x.isPlate).length },
  };
  return map[id] || null;
}

function renderNav() {
  const nav = document.getElementById('nav');
  const stockWarn = STYLES.reduce((t, s) => t + DIGITS.filter(d => (state.stock[s]?.[d] ?? 20) <= LOW_WARN).length, 0);
  const inboxUnread = state.inbox.filter(t => t.unread).length;
  nav.innerHTML = NAV.map(item => {
    if (item.section) return `<div class="nav-section">${item.section}</div>`;
    const b = getBadge(item.id);
    let badgeHtml = '';
    if (item.id === 'stock') badgeHtml = `<span class="badge ${stockWarn > 0 ? 'urgent' : ''}">${stockWarn > 0 ? stockWarn : '✓'}</span>`;
    else if (item.id === 'inbox') badgeHtml = inboxUnread > 0 ? `<span class="badge urgent">${inboxUnread}</span>` : '';
    else if (b) badgeHtml = `<span class="badge ${b.type || ''}">${b.n}</span>`;
    return `<button class="nav-btn ${state.view === item.id ? 'active' : ''}" onclick="setView('${item.id}')">
      <span class="label">${item.icon} ${item.label}</span>${badgeHtml}
    </button>`;
  }).join('');
}

function setView(v) {
  state.view = v;
  renderNav();
  renderView();
}

// ─── RENDER VIEW ─────────────────────────────────────────────────────────────
const PAGE_TITLES = {
  all:'All orders',urgent:'Urgent — 10+ days',warning:'7–9 days',recent:'Recent orders',
  docs:'Docs pending',luxury:'Luxury builder',standard:'Standard plates',accessories:'Accessories',
  finance:'Financial dashboard',stock:'Stock tracker',inbox:'Customer inbox',settings:'Settings'
};

function renderView() {
  document.getElementById('page-title').textContent = PAGE_TITLES[state.view] || 'Dashboard';
  const content = document.getElementById('content');
  if (state.view === 'inbox') {
    content.style.padding = '0';
    content.style.overflow = 'hidden';
    content.style.height = 'calc(100vh - 49px)';
    content.innerHTML = renderInbox();
    bindInboxEvents();
  } else {
    content.style.padding = '18px 20px';
    content.style.overflow = 'auto';
    content.style.height = '';
    if (['all','urgent','warning','recent','docs','luxury','standard','accessories'].includes(state.view)) {
      content.innerHTML = renderOrders();
    } else if (state.view === 'finance') {
      content.innerHTML = renderFinance();
    } else if (state.view === 'stock') {
      content.innerHTML = renderStock();
      bindStockEvents();
    } else if (state.view === 'settings') {
      content.innerHTML = renderSettings();
    }
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function isStd(o) { return o.isPlate && o.val < 70 && (!o.holder || o.holder === 'No Holders'); }
function urgClass(days) { return days >= 10 ? 'urgent' : days >= 7 ? 'warning' : 'ok'; }
function fmt(n) { return '£' + Math.round(n).toLocaleString('en-GB'); }
function fmtd(n) { return '£' + Number(n).toFixed(2); }
function pct(n) { return Math.round(n) + '%'; }

function calcCOGS(rev, date) {
  const post = new Date(date) >= CHEN_MIA_DATE;
  const hasHolder = rev >= 95;
  const hasBorder = rev > 40;
  const digits = post ? 4.50 : 5.60;
  const holders = hasHolder ? (post ? 4.50 : 12.00) : 0;
  const border = hasBorder ? 2.00 : 0;
  return 3.36 + 1.40 + digits + border + holders + 0.75 + 1.25 + 3.50;
}

function docChipHtml(docs, isPlate, isStandard) {
  if (!isPlate || isStandard) return `<span class="doc-chip na">No docs needed</span>`;
  if (docs === 'conf') return `<span class="doc-chip conf">✓ Docs confirmed</span>`;
  if (docs === 'pend') return `<span class="doc-chip pend">⏳ Awaiting docs</span>`;
  return `<span class="doc-chip none">⚠ Docs not received</span>`;
}

// ─── ORDERS VIEW ─────────────────────────────────────────────────────────────
function renderOrders() {
  const filtered = state.orders.filter(o => {
    const u = urgClass(o.days), std = isStd(o);
    if (state.view === 'all') return true;
    if (state.view === 'urgent') return u === 'urgent';
    if (state.view === 'warning') return u === 'warning';
    if (state.view === 'recent') return u === 'ok';
    if (state.view === 'docs') return o.isPlate && !std && o.docs !== 'conf' && o.docs !== 'na';
    if (state.view === 'luxury') return o.isPlate && !std;
    if (state.view === 'standard') return std;
    if (state.view === 'accessories') return !o.isPlate;
    return true;
  });

  const totalVal = state.orders.reduce((s,o) => s + o.val, 0);
  const urgent = state.orders.filter(o => o.days >= 10).length;
  const docsPend = state.orders.filter(o => o.isPlate && !isStd(o) && o.docs !== 'conf' && o.docs !== 'na').length;

  if (!state.orders.length) {
    return `<div style="text-align:center;padding:60px 20px;color:var(--faint)">
      <div style="font-size:32px;margin-bottom:12px">📭</div>
      <div style="font-size:14px;margin-bottom:8px">No orders loaded yet</div>
      <div style="font-size:12px">Add your API key in Settings and hit Refresh</div>
    </div>`;
  }

  const pills = `<div class="filter-pills">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--muted)">
        Total <strong style="color:var(--text);margin-left:4px">${state.orders.length}</strong>
      </div>
      ${urgent > 0 ? `<div style="background:rgba(226,75,74,0.12);border:1px solid rgba(226,75,74,0.3);border-radius:20px;padding:4px 12px;font-size:11px;color:#f08a89">🔴 Urgent <strong>${urgent}</strong></div>` : ''}
      ${docsPend > 0 ? `<div style="background:rgba(239,159,39,0.12);border:1px solid rgba(239,159,39,0.3);border-radius:20px;padding:4px 12px;font-size:11px;color:#f4b860">📂 Docs pending <strong>${docsPend}</strong></div>` : ''}
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--muted)">${fmt(totalVal)} in queue</div>
    </div>
  </div>`;

  if (!filtered.length) return pills + `<div style="text-align:center;padding:40px;color:var(--faint);font-size:13px">No orders in this category</div>`;

  return pills + filtered.map(o => {
    const u = urgClass(o.days), std = isStd(o);
    return `<div class="order-card" id="oc-${o.num.replace('#','')}">
      <div class="order-accent ${u}"></div>
      <div class="order-body">
        <div class="order-row1">
          ${o.prev
            ? `<img class="plate-img" src="${o.prev}" alt="plate" onerror="this.style.display='none'">`
            : `<div class="plate-img-empty"></div>`}
          <div class="order-info">
            <div class="order-meta">${o.num} · ${new Date(o.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
            <div class="order-name">${o.name}</div>
            ${o.reg ? `<div class="reg-plate">${o.reg.trim()}</div>` : ''}
          </div>
          <div class="order-right">
            <div class="order-val">£${o.val.toFixed(2)}</div>
            <div class="days-chip ${u}" style="margin-top:4px">${o.days}d waiting</div>
          </div>
        </div>
        ${o.isPlate && o.style ? `<div class="spec-grid">
          ${[['Style',o.style],['Front',o.front],['Rear',o.rear],['Border',o.border]].map(([l,v])=>`
            <div class="spec-box"><div class="spec-lbl">${l}</div><div class="spec-val">${v||'–'}</div></div>`).join('')}
        </div>` : ''}
        ${o.holder && o.holder !== 'No Holders' ? `<div class="holder-chip">📦 ${o.holder}${o.holderText ? ' — '+o.holderText : ''}</div><br>` : ''}
        ${o.extras && o.extras.length ? `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">+ ${o.extras.join(', ')}</div>` : ''}
        ${o.note ? `<div class="note-box">📝 ${o.note}</div>` : ''}
        <div class="order-footer">
          ${docChipHtml(o.docs, o.isPlate, std)}
          <div style="display:flex;gap:6px;align-items:center">
            ${o.isPlate && !std && o.docs !== 'conf' && o.docs !== 'na' ? `<button class="fulfill-btn" style="background:var(--surface3);color:var(--text);font-size:11px" onclick="markDoc('${o.num}')">✓ Mark docs received</button>` : ''}
            <button class="fulfill-btn" onclick="markFulfilled('${o.num}')">Mark fulfilled</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function markDoc(num) {
  state.orders = state.orders.map(o => o.num === num ? {...o, docs:'conf'} : o);
  save('uniq_orders', state.orders);
  renderNav();
  renderView();
}

function markFulfilled(num) {
  const o = state.orders.find(x => x.num === num);
  if (!o) return;
  if (!confirm(`Mark ${o.num} (${o.name}) as fulfilled?\n\nThis will remove it from the board and deduct digits from stock.`)) return;
  if (o.reg && o.style) {
    const ns = JSON.parse(JSON.stringify(state.stock));
    const sk = o.style.includes('5MM') ? ['5mm','retro'] : (o.style.includes('GEL')||o.style.includes('Gel')) ? ['gel'] : ['retro'];
    o.reg.replace(/\s/g,'').toUpperCase().split('').forEach(ch => {
      sk.forEach(s => { if (ns[s]?.[ch] !== undefined) ns[s][ch] = Math.max(0, ns[s][ch] - 2); });
    });
    state.stock = ns; save('uniq_stock', ns);
  }
  state.orders = state.orders.filter(x => x.num !== num);
  save('uniq_orders', state.orders);
  renderNav(); renderView();
}

// ─── FINANCE VIEW ────────────────────────────────────────────────────────────
function renderFinance() {
  const data = state.finData;
  if (!data.length) return `<div style="text-align:center;padding:60px;color:var(--faint)">No financial data — hit Refresh to load</div>`;
  const rev30 = data.reduce((s,o) => s + o.revenue, 0);
  const mtd = data.filter(o => o.date >= '2026-06-01').reduce((s,o) => s + o.revenue, 0);
  const thisWeek = data.filter(o => o.date >= '2026-06-09').reduce((s,o) => s + o.revenue, 0);
  const lastWeek = data.filter(o => o.date >= '2026-06-02' && o.date <= '2026-06-08').reduce((s,o) => s + o.revenue, 0);
  const wow = lastWeek > 0 ? ((thisWeek - lastWeek)/lastWeek*100) : 0;
  const gp30 = data.reduce((s,o) => { const c = calcCOGS(o.revenue, o.date); return s + (o.revenue - c - o.revenue*SHOPIFY_FEE); }, 0);
  const aov = data.length ? rev30/data.length : 0;

  const dayMap = {};
  data.forEach(o => { dayMap[o.date] = (dayMap[o.date]||0) + o.revenue; });
  const days30 = Array.from({length:30},(_,i) => {
    const d = new Date('2026-06-13'); d.setDate(d.getDate()-(29-i));
    const key = d.toISOString().slice(0,10);
    return { label:`${d.getDate()}/${d.getMonth()+1}`, key, rev: dayMap[key]||0 };
  });
  const maxRev = Math.max(...days30.map(d => d.rev), 1);

  const junOrders = data.filter(o => o.date >= '2026-06-01');

  return `
  <div class="stat-grid">
    <div class="stat-card accent-yellow"><div class="stat-label">30-day revenue</div><div class="stat-val yellow">${fmt(rev30)}</div><div class="stat-sub">${data.length} orders · ${fmtd(aov)} AOV</div></div>
    <div class="stat-card accent-green"><div class="stat-label">Month to date</div><div class="stat-val green">${fmt(mtd)}</div><div class="stat-sub">${junOrders.length} orders in June</div></div>
    <div class="stat-card ${wow>=0?'accent-green':'accent-red'}"><div class="stat-label">This week</div><div class="stat-val ${wow>=0?'green':'red'}">${fmt(thisWeek)}</div><div class="stat-sub">${wow>=0?'+':''}${Math.round(wow)}% vs last week</div></div>
    <div class="stat-card"><div class="stat-label">Last week</div><div class="stat-val">${fmt(lastWeek)}</div><div class="stat-sub">2–8 Jun</div></div>
    <div class="stat-card accent-green"><div class="stat-label">Est. gross profit (30d)</div><div class="stat-val green">${fmt(gp30)}</div><div class="stat-sub">${pct(gp30/rev30*100)} margin</div></div>
    <div class="stat-card"><div class="stat-label">Avg orders/day</div><div class="stat-val">${(data.length/30).toFixed(1)}</div><div class="stat-sub">Target: 8–10/day</div></div>
  </div>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px">
    <div class="section-title">Daily revenue — last 30 days</div>
    <div class="bar-chart">
      ${days30.map(d => `<div class="bar-day" title="${d.label}: £${d.rev.toFixed(0)}">
        <div class="bar-fill" style="height:${d.rev > 0 ? Math.max((d.rev/maxRev)*74,3) : 2}px;background:${d.key>='2026-06-09'?YELLOW:'rgba(254,219,21,0.3)'}"></div>
        <div class="bar-lbl">${d.label.split('/')[0]}</div>
      </div>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap">
      <span>Best day: <strong style="color:var(--text)">${fmt(Math.max(...days30.map(d=>d.rev)))}</strong></span>
      <span>Avg/day: <strong style="color:var(--text)">${fmt(rev30/30)}</strong></span>
      <span>Run rate: <strong style="color:${GREEN}">${fmt(rev30/30*30)}/month</strong></span>
    </div>
  </div>

  <div class="section-title">Per order — June</div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px">
    <table class="data-table">
      <thead><tr><th>Order</th><th>Date</th><th>Revenue</th><th>COGS</th><th>Gross profit</th><th>Margin</th></tr></thead>
      <tbody>${[...junOrders].reverse().map(o => {
        const c = calcCOGS(o.revenue, o.date);
        const gp = o.revenue - c - o.revenue*SHOPIFY_FEE;
        const m = (gp/o.revenue)*100;
        return `<tr>
          <td style="font-weight:600">${o.num}</td>
          <td>${new Date(o.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</td>
          <td style="font-weight:600">${fmtd(o.revenue)}</td>
          <td style="color:#f08a89">${fmtd(c)}</td>
          <td style="color:${GREEN};font-weight:700">${fmtd(gp)}</td>
          <td><span style="font-size:11px;font-weight:600">${pct(m)}</span>
            <div style="height:3px;background:var(--surface3);border-radius:2px;margin-top:3px;overflow:hidden">
              <div style="width:${Math.min(m,100)}%;height:100%;background:${m>75?GREEN:m>55?AMBER:RED};border-radius:2px"></div>
            </div></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;
}

// ─── STOCK VIEW ───────────────────────────────────────────────────────────────
function renderStock() {
  const tab = state.stockTab || 'retro';
  const warnings = [];
  STYLES.forEach(s => DIGITS.forEach(d => { if ((state.stock[s]?.[d]??20) <= LOW_WARN) warnings.push({style:STYLE_LABELS[s],digit:d,qty:state.stock[s][d]}); }));
  const total = STYLES.reduce((t,s) => t + DIGITS.reduce((tt,d) => tt + (state.stock[s]?.[d]||0),0),0);
  const nums = DIGITS.filter(d => !isNaN(Number(d)));
  const lets = DIGITS.filter(d => isNaN(Number(d)));

  const renderCell = (s, d) => {
    const qty = state.stock[s]?.[d] ?? 20;
    const lvl = qty <= LOW_CRIT ? 'crit' : qty <= LOW_WARN ? 'warn' : '';
    return `<div class="stock-cell ${lvl}">
      <div class="stock-digit">${d}</div>
      <div class="stock-qty ${lvl}">${qty}</div>
      <div class="stock-btns">
        <button class="stock-btn" onclick="adjustStock('${s}','${d}',-1)">−</button>
        <button class="stock-btn" onclick="adjustStock('${s}','${d}',1)">+</button>
      </div>
    </div>`;
  };

  return `
  ${warnings.length ? `<div style="background:rgba(226,75,74,0.1);border:1px solid rgba(226,75,74,0.3);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span style="font-size:12px;font-weight:700;color:#f08a89;white-space:nowrap">⚠ Low stock:</span>
    ${warnings.map(w=>`<span style="font-size:11px;font-weight:600;background:var(--surface2);padding:2px 8px;border-radius:20px;color:#f08a89;border:1px solid rgba(226,75,74,0.3)">${w.style} "${w.digit}" — ${w.qty}</span>`).join('')}
  </div>` : ''}

  <div class="stat-grid" style="margin-bottom:14px">
    <div class="stat-card"><div class="stat-label">Total digits</div><div class="stat-val">${total}</div><div class="stat-sub">All 3 styles</div></div>
    <div class="stat-card"><div class="stat-label">Low stock alerts</div><div class="stat-val ${warnings.length>0?'red':''}">${warnings.length}</div><div class="stat-sub">${warnings.filter(w=>w.qty<=LOW_CRIT).length} critical</div></div>
    <div class="stat-card"><div class="stat-label">Warn threshold</div><div class="stat-val">${LOW_WARN}</div><div class="stat-sub">Per digit per style</div></div>
  </div>

  <div style="display:flex;gap:6px;margin-bottom:14px">
    ${STYLES.map(s=>`<button onclick="setStockTab('${s}')" style="padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:${(state.stockTab||'retro')===s?YELLOW:'transparent'};color:${(state.stockTab||'retro')===s?'#111':'var(--muted)'};font-size:12px;font-weight:600">${STYLE_LABELS[s]}</button>`).join('')}
  </div>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px">
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px;display:flex;gap:14px">
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:rgba(239,159,39,0.2);border:1px solid ${AMBER};border-radius:2px;display:inline-block"></span>Warning ≤${LOW_WARN}</span>
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:rgba(226,75,74,0.2);border:1px solid ${RED};border-radius:2px;display:inline-block"></span>Critical ≤${LOW_CRIT}</span>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Numbers 0–9</div>
    <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-bottom:14px">${nums.map(d=>renderCell(tab,d)).join('')}</div>
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Letters A–Z</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px">${lets.map(d=>renderCell(tab,d)).join('')}</div>
  </div>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px">
    <div class="section-title">Deduct by order</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
      <div><div style="font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px">REGISTRATION</div>
        <input id="deduct-reg" style="padding:8px 11px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;width:130px" placeholder="e.g. AB12CDE"></div>
      <div><div style="font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px">STYLE</div>
        <select id="deduct-style" style="padding:8px 11px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;width:130px">
          <option value="retro">Retro</option><option value="5mm">5MM Retro</option><option value="gel">3D Gel</option>
        </select></div>
      <button onclick="deductByOrder()" style="padding:8px 16px;background:${YELLOW};color:#111;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;height:36px">Deduct stock</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Deducts ×2 per digit (front + rear). 5MM Retro deducts from Retro layer too.</div>
  </div>`;
}

function setStockTab(t) { state.stockTab = t; renderView(); }
function bindStockEvents() {}

function adjustStock(style, digit, delta) {
  const ns = JSON.parse(JSON.stringify(state.stock));
  ns[style][digit] = Math.max(0, (ns[style][digit]||0) + delta);
  state.stock = ns; save('uniq_stock', ns);
  renderNav(); renderView();
}

function deductByOrder() {
  const reg = document.getElementById('deduct-reg').value.trim();
  const style = document.getElementById('deduct-style').value;
  if (!reg) return;
  const ns = JSON.parse(JSON.stringify(state.stock));
  const sk = style === '5mm' ? ['5mm','retro'] : style === 'gel' ? ['gel'] : ['retro'];
  reg.replace(/\s/g,'').toUpperCase().split('').forEach(ch => {
    sk.forEach(s => { if (ns[s]?.[ch] !== undefined) ns[s][ch] = Math.max(0, ns[s][ch] - 2); });
  });
  state.stock = ns; save('uniq_stock', ns);
  alert(`Stock deducted for ${reg}`);
  renderView();
}

// ─── INBOX VIEW ───────────────────────────────────────────────────────────────
function renderInbox() {

        <div style="font-size:12px;color:var(--faint)">Hit Refresh to load customer emails</div>

      ${state.inboxLoading ? `<div style="padding:20px;text-align:center;color:var(--faint)"><div class="spinner" style="margin:0 auto"></div><div style="margin-top:10px;font-size:12px">Loading inbox...</div></div>` : ''}
      ${threads.map(t => `

          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">

          <div class="thread-snippet">${t.snippet||''}</div>
          ${state.sent[t.threadId] ? `<span style="font-size:10px;color:${GREEN};font-weight:600">✓ Replied</span>` : ''}
        </div>`).join('')}
    </div>
  </div>`;

  const panelHtml = `
  <div class="inbox-panel">
    ${!selThread ? `<div class="empty-state"><div style="font-size:28px">💬</div><div>Select a thread to read</div></div>` : `
      <div class="msg-header">
        <div class="subject">${selThread.subject||''}</div>
        <div class="from">${selThread.sender||''}</div>
      </div>
      <div class="msg-thread" id="msg-thread">
        ${(selThread.messages||[]).map((m,i) => {
          const isUs = (m.from||'').toLowerCase().includes('uniq') || (m.from||'').toLowerCase().includes('mason') || (m.from||'').toLowerCase().includes('jake');
          return `<div class="bubble-wrap ${isUs?'us':'them'}">
            <div class="bubble-from">${m.from||''} · ${(m.date||'').slice(0,10)}</div>
            <div class="bubble ${isUs?'us':'them'}">${(m.body||'').replace(/</g,'&lt;')}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="compose-area">
        ${state.sent[selThread.threadId] ? `<div style="text-align:center;padding:12px;color:${GREEN};font-weight:600;font-size:13px">✓ Reply sent</div>` : `
          <div class="compose-label">
            <span>${state.composing[selThread.threadId] ? '✦ AI composing reply...' : 'AI draft — review then send'}</span>
            <button onclick="autoCompose('${selThread.threadId}')">↻ Regenerate</button>
          </div>
          <textarea class="compose-textarea" id="draft-${selThread.threadId}"
            placeholder="${state.composing[selThread.threadId] ? 'Composing...' : 'AI will draft a reply automatically...'}"
          >${state.drafts[selThread.threadId]||''}</textarea>
          <div class="compose-actions">
            <button class="btn-clear" onclick="clearDraft('${selThread.threadId}')">Clear</button>
            <button class="btn-send" id="send-btn-${selThread.threadId}" onclick="sendReply('${selThread.threadId}')">${state.sending[selThread.threadId]?'Sending...':'Send reply'}</button>
          </div>`}
      </div>`}
  </div>`;

  return `<div id="inbox-wrap">${listHtml}${panelHtml}</div>`;
}

function bindInboxEvents() {
  // Sync textarea changes back to state
  const sel = state.selectedThread;
  if (sel) {
    const ta = document.getElementById(`draft-${sel}`);
    if (ta) ta.addEventListener('input', e => { state.drafts[sel] = e.target.value; });
  }
}

function selectThread(id) {
  state.selectedThread = id;
  renderView();
  // Auto-compose if no draft yet
  const t = state.inbox.find(x => x.threadId === id);
  if (t && !state.drafts[id] && !state.composing[id] && !state.sent[id] && state.apiKey) {
    autoCompose(id);
  }
}

function clearDraft(id) { state.drafts[id] = ''; renderView(); }

async function loadInbox() {
  if (!state.apiKey) { alert('Add your API key in Settings first'); setView('settings'); return; }
  state.inboxLoading = true;
  renderView();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key': state.apiKey, 'anthropic-version':'2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        system: `Search the Gmail inbox for customer emails from the last 30 days for Uniq Automotive (uniqreguk@gmail.com).
Return ONLY genuine customer queries — people asking about orders, tracking, documents, complaints, refunds, custom requests.
Exclude all automated emails: Google, Shopify, Alibaba, eBay, newsletters, ads, noreply addresses.
For each customer thread return a JSON array:
[{"threadId":"id","subject":"subject","sender":"Name <email>","senderEmail":"email","date":"2026-06-13","snippet":"first 80 chars","unread":true,"messages":[{"from":"name","body":"full body","date":"2026-06-13T10:00:00Z"}]}]
Return ONLY the JSON array. No markdown. No explanation.`,
        messages: [{ role:'user', content:'Fetch customer emails from Gmail inbox last 30 days. Return JSON array only.' }],
        mcp_servers: [{ type:'url', url:'https://gmailmcp.googleapis.com/mcp/v1', name:'gmail' }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type==='text')?.text || '[]';
    const clean = text.replace(/```json|```/g,'').trim();
    const start = clean.indexOf('['), end = clean.lastIndexOf(']');
    if (start !== -1) {
      const parsed = JSON.parse(clean.slice(start, end+1));
      state.inbox = parsed.filter(t => {
        const s = (t.senderEmail||t.sender||'').toLowerCase();
        const spam = ['google.com','googleapis','shopify.com','omnisend','anthropic','noreply','no-reply','uniqreguk@gmail'];
        return !spam.some(d => s.includes(d));
      });
      save('uniq_inbox', state.inbox);
      if (state.inbox.length && !state.selectedThread) state.selectedThread = state.inbox[0].threadId;
    }
  } catch(e) { alert('Could not load inbox: ' + e.message); }
  state.inboxLoading = false;
  renderNav(); renderView();
}

async function autoCompose(threadId) {
  if (!state.apiKey || state.composing[threadId]) return;
  state.composing[threadId] = true;
  const t = state.inbox.find(x => x.threadId === threadId);
  if (!t) { state.composing[threadId] = false; return; }
  const orderCtx = state.orders.slice(0,25).map(o => `${o.num} ${o.name} reg:${o.reg||'n/a'} £${o.val} ${o.days}d docs:${o.docs}`).join('\n');
  const msgHistory = (t.messages||[]).map(m => `${m.from}: ${m.body}`).join('\n\n---\n\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:600,
        system:`You are composing a reply for Uniq Automotive (uniqautos.co.uk) — a UK number plate business run by Mason Jones. Sign off as Jake / Uniq Automotive.
Tone: warm, direct, no fluff, no over-apologising. 
Current pending orders context:\n${orderCtx}
Write a suitable reply to the email thread. Return ONLY the reply body starting with "Hi [name]," — no subject line, no To: field.`,
        messages:[{role:'user',content:`Reply to:\nSubject: ${t.subject}\nFrom: ${t.sender}\n\n${msgHistory}`}]
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b=>b.type==='text')?.text||'';
    state.drafts[threadId] = reply;
  } catch(e) { console.error(e); }
  state.composing[threadId] = false;
  if (state.view === 'inbox') renderView();
}

async function sendReply(threadId) {
  if (!state.apiKey || state.sending[threadId]) return;
  const body = state.drafts[threadId];
  if (!body?.trim()) return;
  const t = state.inbox.find(x => x.threadId === threadId);
  if (!t) return;
  state.sending[threadId] = true;
  renderView();
  try {
    await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:200,
        system:'Send a Gmail reply using the Gmail MCP tool. Confirm with JSON {"sent":true}. No other output.',
        messages:[{role:'user',content:`Reply to thread ${threadId}, to: ${t.senderEmail||t.sender}, subject: Re: ${t.subject}, body: ${body}`}],
        mcp_servers:[{type:'url',url:'https://gmailmcp.googleapis.com/mcp/v1',name:'gmail'}]
      })
    });
    state.sent[threadId] = true;
    state.drafts[threadId] = '';
    // Mark as read
    state.inbox = state.inbox.map(x => x.threadId===threadId ? {...x,unread:false} : x);
    save('uniq_inbox', state.inbox);
  } catch(e) { alert('Send failed: '+e.message); }
  state.sending[threadId] = false;
  renderNav(); renderView();
}

// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────
function renderSettings() {
  return `<div class="settings-wrap">
    <div class="settings-card">
      <h3>Anthropic API key</h3>
      <p>Your API key powers live data refresh, inbox AI drafts, and doc detection. Stored locally in your browser — never sent anywhere except the Anthropic API.</p>
      <input type="password" class="settings-input" id="api-key-input" value="${state.apiKey}" placeholder="sk-ant-...">
      <button class="settings-save" onclick="saveSettings()">Save & activate</button>
    </div>
    <div class="settings-card">
      <h3>About this dashboard</h3>
      <p style="line-height:1.8">
        Built for Uniq Automotive · uniqautos.co.uk<br>
        Production board · Financials · Stock tracker · Customer inbox<br>
        Auto-refreshes every 5 minutes when API key is set.<br>
        Pulls live from Shopify + Gmail + Google Drive.
      </p>
    </div>
  </div>`;
}

function saveSettings() {
  const key = document.getElementById('api-key-input').value.trim();
  state.apiKey = key;
  localStorage.setItem('uniq_api', key);
  alert('Saved! Refreshing data now...');
  refreshAll();
}

// ─── LIVE REFRESH ─────────────────────────────────────────────────────────────
async function refreshAll() {
  if (!state.apiKey) { setView('settings'); return; }
  if (state.refreshing) return;
  state.refreshing = true;
  document.getElementById('refresh-btn').disabled = true;
  document.getElementById('refresh-label').textContent = 'Refreshing...';
  document.getElementById('last-updated').innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block"></div>';

  try {
    // FETCH ORDERS + DOCS IN PARALLEL
    const [ordersRes, finRes] = await Promise.all([
      fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6', max_tokens:5000,
          system:`Fetch ALL unfulfilled paid orders from Shopify. Cross-reference customer docs from Gmail (look for email threads with subject containing "Number Plate Docs" that have replies with attachments — these count as docs confirmed). Also check Google Drive folder ${GDRIVE_DOCS_FOLDER} for uploaded docs.

Filter out test orders (£0 value, name "Mason Jones", "test"). For each real order extract:
- num: order number e.g. "#1795"
- date: YYYY-MM-DD order created date
- name: customer full name
- val: total price as number
- reg: registration plate text (extract from order notes, line items, or attributes — look for UK plate format)
- prev: plate preview image URL from Shopify order (from line item properties or metafields)
- style: plate style (Retro, 5MM Retro, 3D Gel, Standard, etc.)
- front: front plate shape (Standard, Hex, Short, Oversized)
- rear: rear plate shape
- border: border description
- holder: holder quantity and type
- holderText: custom text on holder
- extras: array of extra items
- isPlate: true if order contains number plates
- note: any important notes
- docs: "conf" if V5+ID docs received (attachment in Gmail reply OR file in Drive), "pend" if docs requested but not received, "na" if no docs needed (show plates, accessories), "none" if docs not yet requested
- days: number of days since order was placed (today is ${new Date().toISOString().slice(0,10)})

Return ONLY a JSON array. No markdown. Just [...].`,
          messages:[{role:'user',content:'Fetch all unfulfilled paid orders now with docs status'}],
          mcp_servers:[
            {type:'url',url:'https://setup.shopify.com/mcp',name:'shopify'},
            {type:'url',url:'https://gmailmcp.googleapis.com/mcp/v1',name:'gmail'},
            {type:'url',url:'https://drivemcp.googleapis.com/mcp/v1',name:'gdrive'}
          ]
        })
      }),
      fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6', max_tokens:4000,
          system:`Fetch ALL paid orders from Shopify from the last 30 days. Filter out test orders (£0, Mason Jones). For each return: {"num":"#1234","date":"YYYY-MM-DD","revenue":123.45}. Return ONLY a JSON array. No markdown.`,
          messages:[{role:'user',content:'Fetch all paid orders last 30 days for financial analytics'}],
          mcp_servers:[{type:'url',url:'https://setup.shopify.com/mcp',name:'shopify'}]
        })
      })
    ]);

    // PARSE ORDERS
    const ordersData = await ordersRes.json();
    const ordersText = ordersData.content?.find(b=>b.type==='text')?.text||'';
    const oClean = ordersText.replace(/```json|```/g,'').trim();
    const oStart = oClean.indexOf('['), oEnd = oClean.lastIndexOf(']');
    if (oStart !== -1) {
      const parsed = JSON.parse(oClean.slice(oStart,oEnd+1));
      if (Array.isArray(parsed) && parsed.length) {
        state.orders = parsed;
        save('uniq_orders', parsed);
      }
    }

    // PARSE FIN DATA
    const finData = await finRes.json();
    const finText = finData.content?.find(b=>b.type==='text')?.text||'';
    const fClean = finText.replace(/```json|```/g,'').trim();
    const fStart = fClean.indexOf('['), fEnd = fClean.lastIndexOf(']');
    if (fStart !== -1) {
      const parsed = JSON.parse(fClean.slice(fStart,fEnd+1));
      if (Array.isArray(parsed) && parsed.length) {
        state.finData = parsed;
        save('uniq_fin', parsed);
      }
    }

    state.lastUpdated = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-updated').innerHTML = `<div class="live-dot"></div> Updated ${state.lastUpdated}`;

  } catch(e) {
    console.error(e);
    document.getElementById('last-updated').innerHTML = `<span style="color:var(--red)">Refresh failed</span>`;
  }

  state.refreshing = false;
  document.getElementById('refresh-btn').disabled = false;
  document.getElementById('refresh-label').textContent = 'Refresh all data';
  renderNav();
  renderView();
}
</script>
</body>
</html>
